apiVersion: apps/v1
kind: Deployment
metadata:
  name: bobbins-bot
  labels:
    app: bobbins-bot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bobbins-bot
  template:
    metadata:
      labels:
        app: bobbins-bot
    spec:
      containers:
        - name: bobbins-bot
          image: zzmmrmn/bobbins-bot:<IMAGE_VERSION>
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 100m
              memory: 192Mi
          envFrom:
            - configMapRef:
                name: bobbins-bot-config
            - secretRef:
                name: bobbins-bot-secrets
          env:
            - name: PRODUCTION_BOT
              value: "PRODUCTION"
            - name: "BOT_IMAGE_VERSION"
              value: "<IMAGE_VERSION>"
